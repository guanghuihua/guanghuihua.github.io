<!doctype html>
<html lang="{{ site.lang | default: 'zh-CN' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#f5f1e8">
    <title>{% if page.title and page.title != '首页' %}{{ page.title }} · {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description | strip_html | normalize_whitespace | escape }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <a class="skip-link" href="#main-content">跳到正文</a>
    <header class="site-header">
      <a class="site-title" href="{{ '/' | relative_url }}" aria-label="{{ site.title }}首页">
        <span class="site-mark" aria-hidden="true">光</span>
        <span>{{ site.title }}</span>
      </a>
      <nav aria-label="主导航">
        <a href="{{ '/' | relative_url }}"{% if page.url == '/' %} aria-current="page"{% endif %}>首页</a>
        <a href="{{ '/archive/' | relative_url }}"{% if page.url == '/archive/' %} aria-current="page"{% endif %}>归档</a>
        <a href="{{ '/tags/' | relative_url }}"{% if page.url == '/tags/' %} aria-current="page"{% endif %}>标签</a>
        <a href="{{ '/about/' | relative_url }}"{% if page.url == '/about/' %} aria-current="page"{% endif %}>关于</a>
      </nav>
    </header>

    <main class="page-shell" id="main-content">
      {{ content }}
    </main>

    <footer class="site-footer">
      <p>愿每一次记录，都让时间留下温度。</p>
      <p>© {{ 'now' | date: '%Y' }} Guanghui Hua</p>
    </footer>
  </body>
</html>
